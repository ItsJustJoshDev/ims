name: Build PhhIms

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Download Android 16 QPR2 framework jar
        run: |
          mkdir -p app/libs
          curl -L \
            https://github.com/ItsJustJoshDev/ims/releases/download/android16-qpr2/android.jar \
            -o app/libs/android.jar

      - name: Verify android.jar
        run: |
          ls -lah app/libs/
          file app/libs/android.jar || true
          jar tf app/libs/android.jar | head -20

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: PhhIms-APKs
          path: |
            **/build/outputs/apk/**/*.apk
          if-no-files-found: error
