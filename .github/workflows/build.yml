name: Build PhhIms Magisk Module

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK + Magisk Module
    runs-on: ubuntu-24.04

    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"
        -Dkotlin.incremental=false

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ------------------------------------------------------------
      # Java
      # ------------------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ------------------------------------------------------------
      # Android SDK
      # Avoid android-actions/setup-android because it triggers
      # interactive license installs on modern runners.
      # ------------------------------------------------------------
      - name: Setup Android SDK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

          sdkmanager --version

          yes | sdkmanager --licenses > /dev/null

          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      # ------------------------------------------------------------
      # Hidden API android.jar
      # ------------------------------------------------------------
      - name: Download hidden API android.jar
        run: |
          mkdir -p app/libs

          curl -L --fail --retry 5 --retry-delay 5 \
            "https://github.com/Reginer/aosp-android-jar/releases/download/android-35/android.jar" \
            -o app/libs/android.jar

          echo "Downloaded hidden API android.jar"
          ls -lh app/libs/android.jar

      # ------------------------------------------------------------
      # Gradle permissions
      # ------------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ------------------------------------------------------------
      # Validate Gradle wrapper
      # ------------------------------------------------------------
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # ------------------------------------------------------------
      # Build APK
      # ------------------------------------------------------------
      - name: Build release APK
        run: |
          ./gradlew \
            assembleRelease \
            --stacktrace \
            --no-daemon

      # ------------------------------------------------------------
      # Verify unsigned APK exists
      # ------------------------------------------------------------
      - name: Verify build outputs
        run: |
          ls -R app/build/outputs || true

          test -f app/build/outputs/apk/release/app-release-unsigned.apk

      # ------------------------------------------------------------
      # Sign APK
      # ------------------------------------------------------------
      - name: Sign APK with bundled platform keys
        run: |
          LD_LIBRARY_PATH=./signapk/ \
          java -jar signapk/signapk.jar \
            keys/platform.x509.pem \
            keys/platform.pk8 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            PhhIms.apk

          echo "Signed APK created"
          ls -lh PhhIms.apk

      # ------------------------------------------------------------
      # Assemble Magisk module
      # ------------------------------------------------------------
      - name: Assemble Magisk module
        run: |
          set -e

          MODULE_DIR=magisk_module

          mkdir -p "$MODULE_DIR/system/priv-app/PhhIms"
          mkdir -p "$MODULE_DIR/system/etc/permissions"
          mkdir -p "$MODULE_DIR/system/product/overlay"
          mkdir -p "$MODULE_DIR/META-INF/com/google/android"

          # APK
          cp PhhIms.apk \
            "$MODULE_DIR/system/priv-app/PhhIms/PhhIms.apk"

          # Privapp permissions
          cat > "$MODULE_DIR/system/etc/permissions/privapp-permissions-me.phh.ims.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <permissions>
              <privapp-permissions package="me.phh.ims">
                  <permission name="android.permission.READ_PRIVILEGED_PHONE_STATE"/>
                  <permission name="android.permission.MODIFY_PHONE_STATE"/>
                  <permission name="android.permission.READ_PRECISE_PHONE_STATE"/>
              </privapp-permissions>
          </permissions>
          EOF

          # Optional overlay
          if [ -f module/system/product/overlay/PhhImsOverlay.apk ]; then
            cp module/system/product/overlay/PhhImsOverlay.apk \
              "$MODULE_DIR/system/product/overlay/PhhImsOverlay.apk"
          fi

          # module.prop
          cat > "$MODULE_DIR/module.prop" << 'EOF'
          id=phhims_d2s
          name=PhhIms VoLTE for d2s
          version=v1
          versionCode=1
          author=krazey/phhusson adapted by Josh
          description=VoLTE/VoWiFi IMS stack for Samsung Galaxy Note10+ d2s custom ROMs
          EOF

          # update-binary
          cat > "$MODULE_DIR/META-INF/com/google/android/update-binary" << 'EOF'
          #!/sbin/sh
          SKIPUNZIP=1
          unzip -o "$ZIPFILE" 'system/*' -d "$MODPATH"
          unzip -o "$ZIPFILE" 'module.prop' -d "$MODPATH"
          set_perm_recursive "$MODPATH/system/priv-app" root root 0755 0644
          set_perm "$MODPATH/system/priv-app/PhhIms/PhhIms.apk" root root 0644
          EOF

          chmod +x "$MODULE_DIR/META-INF/com/google/android/update-binary"

          # updater-script
          cat > "$MODULE_DIR/META-INF/com/google/android/updater-script" << 'EOF'
          #MAGISK
          EOF

          cd "$MODULE_DIR"
          zip -r ../PhhIms-d2s-magisk.zip .

      # ------------------------------------------------------------
      # Upload artifacts
      # ------------------------------------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhhIms-APK
          path: PhhIms.apk
          retention-days: 14

      - name: Upload Magisk Module
        uses: actions/upload-artifact@v4
        with:
          name: PhhIms-d2s-Magisk
          path: PhhIms-d2s-magisk.zip
          retention-days: 14
